workflows:
  ios-release:
    name: iOS Release to Apple App Store Connect
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: app_store3
    environment:
      vars:
        BUNDLE_ID: "com.mediamgj.monde"
        XCODE_PROJECT: "$CM_BUILD_DIR/ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.mediamgj.monde
      node: v22.13.0
      xcode: latest
    scripts:
      - name: Install NPM dependencies
        script: |
          npm install
      - name: Build Web Bundle (Vite)
        script: |
          npm run build
      - name: Sync Capacitor iOS Platform
        script: |
          npx cap sync ios
      - name: Auto-increment iOS build number
        script: |
          cd "$CM_BUILD_DIR/ios/App"
          agvtool new-version -all $(($BUILD_NUMBER + 20))
      - name: Set up keychain for code signing
        script: |
          keychain initialize
      - name: Add existing distribution certificates to keychain if any
        script: |
          keychain add-certificates || true
      - name: Ensure App ID exists on Apple Developer Portal automatically
        script: |
          app-store-connect create-bundle-id --id "com.mediamgj.monde" --name "Media MGJ Monde" --type APP || true
      - name: Automatically fetch and create missing Certificates & Provisioning Profiles
        script: |
          app-store-connect fetch-signing-files "com.mediamgj.monde" \
            --type IOS_APP_STORE \
            --create \
            --create-certificate \
            --verbose
      - name: Add downloaded certificates & private keys to keychain
        script: |
          keychain add-certificates
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles --project "$CM_BUILD_DIR/ios/App/App.xcodeproj"
      - name: Build signed iOS IPA for App Store Connect
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/ios/App/App.xcodeproj" \
            --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/Products/Release-iphoneos/*.app
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
