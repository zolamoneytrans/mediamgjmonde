workflows:
  ios-release:
    name: iOS Release to Apple App Store Connect
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: app_store
    environment:
      vars:
        BUNDLE_ID: "com.mediamgj.monde"
        XCODE_PROJECT: "$CM_BUILD_DIR/ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      node: v22.13.0
      xcode: latest
    scripts:
      - name: Install NPM dependencies
        script: npm install

      - name: Build Web Bundle (Vite)
        script: npm run build

      - name: Sync Capacitor iOS Platform
        script: npx cap sync ios

      - name: Auto-increment iOS build number
        script: |
          cd "$CM_BUILD_DIR/ios/App"
          agvtool new-version -all $(($BUILD_NUMBER + 20))

      - name: Set up keychain for code signing
        script: keychain initialize

      - name: Ensure App ID exists on Apple Developer Portal
        script: |
          app-store-connect create-bundle-id --id "$BUNDLE_ID" --name "Media MGJ Monde" --type APP || true

      - name: Diagnostic — print all existing certificates returned by Apple API right now
        script: |
          echo "=== ALL DISTRIBUTION CERTIFICATES IN APPLE DEVELOPER PORTAL ==="
          app-store-connect list-certificates --type IOS_DISTRIBUTION --pretty || true
          echo "=== ALL CERTIFICATES OF ANY TYPE ==="
          app-store-connect list-certificates --pretty || true

      - name: Generate Apple Certificate (.p12) & Provisioning Profile (.mobileprovision) atomically
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --verbose

      - name: Add downloaded certificates & profiles to keychain and authorize codesign
        script: |
          keychain add-certificates
          security set-key-partition-list -S apple-tool,apple,codesign -s -k "" login.keychain-db || true
          echo "=== Provisioning Profiles Downloaded ==="
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles" || true
          echo "=== Valid Code Signing Identities ==="
          security find-identity -v -p codesigning || true

      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles --project "$XCODE_PROJECT" --verbose

      - name: Build signed iOS IPA for App Store Connect
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/Products/Release-iphoneos/*.app

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
