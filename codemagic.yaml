workflows:
  ios-release:
    name: iOS Release to Apple App Store Connect
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: codemagic
    environment:
      node: v20.15.0
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install NPM dependencies
        script: |
          npm install
      - name: Build Web Bundle (Vite)
        script: |
          npm run build
      - name: Sync Capacitor iOS Platform
        script: |
          npx cap sync ios
      - name: Install iOS CocoaPods
        script: |
          cd ios/App && pod install
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Build signed iOS IPA for App Store Connect
        script: |
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/ios/App/App.xcworkspace" \
            --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/Products/Release-iphoneos/*.app
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
