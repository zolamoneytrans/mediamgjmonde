workflows:
  ios-release:
    name: iOS Release to Apple App Store Connect
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: app_store
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.mediamgj.monde
      node: v22.13.0
      xcode: latest
    scripts:
      - name: Install NPM dependencies
        script: |
          npm install
      - name: Build Web Bundle (Vite)
        script: |
          npm run build
      - name: Sync Capacitor iOS Platform
        script: |
          npx cap sync ios
      - name: Auto-increment iOS build number
        script: |
          cd "$CM_BUILD_DIR/ios/App"
          agvtool new-version -all $(($BUILD_NUMBER + 20))
      - name: Set up keychain for code signing
        script: |
          keychain initialize
      - name: Add existing distribution certificates to keychain
        script: |
          keychain add-certificates || true
      - name: Ensure iOS Distribution Certificate exists via API
        script: |
          app-store-connect create-certificate --type IOS_DISTRIBUTION || true
      - name: Fetch Apple distribution certificates and profiles
        script: |
          app-store-connect fetch-signing-files "com.mediamgj.monde" --type IOS_APP_STORE --create --verbose
      - name: Add downloaded certificates to keychain
        script: |
          keychain add-certificates || true
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles --project "$CM_BUILD_DIR/ios/App/App.xcodeproj"
      - name: Build signed iOS IPA for App Store Connect
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/ios/App/App.xcodeproj" \
            --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/Products/Release-iphoneos/*.app
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
